<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f2eb;
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #fff;
  border: 1px solid #e0dbd0;
  border-top: 3px solid #8b1a1a;
  border-radius: 10px;
  padding: 40px 32px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
}
.logo-wrap { text-align: center; margin-bottom: 32px; }
.logo-wrap img { height: 56px; width: auto; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10px; font-weight: 700; letter-spacing: .12em; color: #8a8478; margin-bottom: 6px; }
.field input {
  width: 100%; background: #f5f2eb; border: 1px solid #444; color: #f0f0f0;
  border-radius: 5px; padding: 12px 14px; font-size: 14px;
  font-family: 'Syne', sans-serif; color: #1a1814;
}
.field input:focus { outline: none; border-color: #c8c2b4; }
.btn {
  width: 100%; padding: 13px; background: #8b1a1a; color: #fff;
  border: none; border-radius: 5px; font-size: 14px; font-weight: 700;
  font-family: 'Syne', sans-serif; cursor: pointer; letter-spacing: .04em;
  margin-top: 8px; transition: opacity .15s;
}
.btn:hover { opacity: .88; }
.error { background: #fdecea; color: #8b1a1a; border-radius: 5px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
</style>

  <div class="error" id="err">Usuário ou senha incorretos.</div>
  <div class="field">
    <label>USUÁRIO</label>
    <input type="text" id="username" value="beto" autocomplete="username">
  </div>
  <div class="field">
    <label>SENHA</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" onclick="login()">Entrar</button>
</div>
<script>
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      err.style.display = 'block';
    }
  } catch(e) {
    err.style.display = 'block';
    err.textContent = 'Erro de conexão. Tente novamente.';
  }
}
</script>
